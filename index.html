<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Week 12 CFAT Dashboard</title>
  <style>
    /* Add your CSS here */
    body { font-family: Arial, sans-serif; padding: 20px; }
    .metric { margin-bottom: 20px; }
    .progress-bar { width: 100%; background: #f0f0f0; border-radius: 5px; }
    .progress { height: 20px; background: #4caf50; border-radius: 5px; transition: width 0.5s; }
  </style>
</head>
<body>
  <h1>📊 Week 12 CFAT Dashboard</h1>

  <!-- QBR Hallucinations -->
  <div class="metric">
    <h2>QBR Hallucinations</h2>
    <p>Remaining: <span id="qbr-remaining">290</span>/<span id="qbr-total">1500</span></p>
    <p>Adjudication: <span id="qbr-adjudication">in progress</span></p>
    <p>HC: <span id="qbr-hc">4</span> | AHT: <span id="qbr-aht">5.36</span> min</p>
  </div>

  <!-- GRS Languages -->
  <div class="metric">
    <h2>GRS Languages</h2>
    <div id="grs-languages"></div>
  </div>

  <!-- Add other sections here -->

  <script>
    // Embedded JSON data (replace with your actual data)
    const dashboardData = {
      qbr_hallucinations: {
        remaining: 290,
        total: 1500,
        adjudication: "in progress",
        hc: 4,
        aht: 5.36
      },
      grs: {
        languages: {
          PT: { completed: 22, total: 100 },
          FR: { completed: 46, total: 100 },
          DE: { completed: 64, total: 100 },
          IT: { completed: 9, total: 100 },
          ES: { completed: 5, total: 100 },
          JP: { status: "not started" },
          "JP-EN": { status: "not started" },
          "DE-EN": { status: "not started" },
          CA: { status: "not started" }
        },
        aht: 3.69
      },
      videos_30secs: {
        tasks: 100,
        aht: 5.30,
        current_task_aht: 5.30
      },
      mission_bundles: {
        completed: 1087,
        total: 4380,
        hc: 2,
        language: "EN"
      },
      review_sharing: {
        tasks: 50,
        hc: 5,
        status: "starting today"
      }
    };

    // Render QBR Hallucinations
    document.getElementById('qbr-remaining').textContent = dashboardData.qbr_hallucinations.remaining;
    document.getElementById('qbr-total').textContent = dashboardData.qbr_hallucinations.total;
    document.getElementById('qbr-adjudication').textContent = dashboardData.qbr_hallucinations.adjudication;
    document.getElementById('qbr-hc').textContent = dashboardData.qbr_hallucinations.hc;
    document.getElementById('qbr-aht').textContent = dashboardData.qbr_hallucinations.aht;

    // Render GRS Languages
    const grsContainer = document.getElementById('grs-languages');
    for (const [lang, data] of Object.entries(dashboardData.grs.languages)) {
      const langDiv = document.createElement('div');
      langDiv.innerHTML = `
        <strong>${lang}:</strong> 
        ${data.completed !== undefined 
          ? `${data.completed}/${data.total} (${Math.round((data.completed / data.total) * 100)}%)` 
          : data.status}
      `;
      grsContainer.appendChild(langDiv);
    }
  </script>
</body>
</html>
